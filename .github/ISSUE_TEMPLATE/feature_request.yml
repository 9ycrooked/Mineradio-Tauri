name: 功能建议
description: 提出一个新功能、体验改进或产品想法
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        感谢建议。请尽量说明使用场景，而不只是实现方式。

  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 这个建议来自什么使用场景？现在哪里不够顺手？
      placeholder: 例如：播放队列很长时，我很难快速找到当前播放歌曲附近的内容。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你希望 MineRadio-Tauri 如何支持这个功能？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否试过其他方式？有没有可以接受的轻量方案？
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: 相关范围
      options:
        - 播放
        - 搜索 / Provider
        - 歌词
        - 视觉 / 3D 歌单架
        - 桌面窗口 / 系统集成
        - 更新 / 安装包
        - 开发体验
        - 文档
        - 不确定
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: 影响与注意事项
      description: 这个功能是否会影响现有习惯、第三方服务、隐私、性能或安装包？
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: 参考资料
      description: 可贴参考截图、录屏、链接或类似产品体验。
    validations:
      required: false
